      q: "What is the difference between goroutines and OS threads?",
      diff: "med",
      answer: `Goroutines are multiplexed onto a small number of OS threads by the Go runtime scheduler (M:N threading). A fresh goroutine costs ~2 KB of stack vs ~1 MB for a thread, and the runtime grows/shrinks stacks dynamically.`,
      code: `// Spawning 100,000 goroutines is fine
for i := 0; i < 100_000; i++ {
    go func(n int) {
        time.Sleep(time.Second)
        fmt.Println(n)
    }(i)
}`
    },
    {
      q: "Explain Go's memory model and the happens-before relationship.",
      diff: "hard",
      answer: `Go's memory model defines when reads of a variable are guaranteed to observe writes. A write W to variable x is observed by read R if W happens-before R and no other write interferes. Synchronization primitives (channels, sync.Mutex, sync.WaitGroup) establish happens-before edges.`,
      code: `var x int
var wg sync.WaitGroup
wg.Add(1)
go func() {
    x = 42         // write
    wg.Done()      // signals happens-before
}()
wg.Wait()          // establishes happens-before
fmt.Println(x)     // safe to read 42`
    },

      answer: `The Go scheduler uses a three-level model: G (goroutine), M (OS thread), P (processor). Each P holds a local run queue. When a P's queue is empty it steals goroutines from other Ps. GOMAXPROCS sets the number of active Ps (defaults to CPU count). Blocking syscalls park the M and a new M is brought in to service the P.`,
      code: `// Set parallelism explicitly
runtime.GOMAXPROCS(4)
fmt.Println("Num CPU:", runtime.NumCPU())
fmt.Println("Num Goroutines:", runtime.NumGoroutine())`

type User struct{ Name string }
func (u User) String() string { return u.Name }

type Admin struct {

      code: `// Tune GC for low-latency services

      diff: "med",
      answer: `A worker pool limits concurrent goroutines. A buffered jobs channel feeds N worker goroutines; a results channel collects output. A WaitGroup ensures all workers finish before closing results.`,
      code: `func workerPool(jobs <-chan Job, numWorkers int) <-chan Result {
    results := make(chan Result, len(jobs))
    var wg sync.WaitGroup
    for i := 0; i < numWorkers; i++ {
        wg.Add(1)
        go func() {
            defer wg.Done()
            for j := range jobs {
                results <- process(j)
            }
        }()
    }
    go func() { wg.Wait(); close(results) }()
    return results
}`

      code: `func (h *Handler) CreateOrder(w http.ResponseWriter, r *http.Request) {
    key := r.Header.Get("Idempotency-Key")
    if key == "" {
        http.Error(w, "missing idempotency key", 400)
        return
    }
    // Check cache first
    if cached, err := h.redis.Get(ctx, "idem:"+key).Bytes(); err == nil {
        w.Write(cached); return
    }
    // Acquire lock, process, store result
    result := h.processOrder(r)
    h.redis.Set(ctx, "idem:"+key, result, 24*time.Hour)
    w.Write(result)
}`

func buildMsg(data []byte) string {

    buf := bufPool.Get().(*bytes.Buffer)

const categories = Object.keys(data);
let activeTab = categories[0];
let openIdx = null;

function render() {
  const tabsEl = document.getElementById('tabs');
  const qlistEl = document.getElementById('qlist');
  const progressEl = document.getElementById('progress');

  tabsEl.innerHTML = categories.map(c =>
    `<div class="tab${c === activeTab ? ' active' : ''}" onclick="setTab('${c}')">${c}</div>`
  ).join('');

  const qs = data[activeTab];
  progressEl.textContent = `${qs.length} questions`;
  qlistEl.innerHTML = qs.map((q, i) => {
    const isOpen = openIdx === i;
    const diffClass = q.diff === 'hard' ? 'tag-hard' : q.diff === 'med' ? 'tag-med' : 'tag-easy';
    const diffLabel = q.diff === 'hard' ? 'Senior' : q.diff === 'med' ? 'Mid' : 'Fundamental';
    return `<div class="qcard">
      <div class="qcard-header" onclick="toggleQ(${i})">
        <div class="q-left">
          <span class="q-num">${i+1}.</span>
          <span class="q-text">${q.q}</span>
        </div>
        <span class="q-arrow${isOpen ? ' open' : ''}">▾</span>
      </div>
      ${isOpen ? `<div class="qcard-body">
        <span class="tag ${diffClass}">${diffLabel}</span>
        <p>${q.answer}</p>
        ${q.code ? `<div class="section-label">Example</div><pre>${escHtml(q.code)}</pre>` : ''}
        <button class="deep-dive" onclick="deepDive('${escAttr(q.q)}')">Ask Claude for a deeper dive ↗</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/'/g,"\\'"); }

function setTab(t) { activeTab = t; openIdx = null; render(); }
function toggleQ(i) { openIdx = openIdx === i ? null : i; render(); }
function deepDive(q) { sendPrompt('Can you go deeper on this Go interview topic: ' + q); }

render();
</script>
